name: schema-check

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate protocol schemas
        run: python3 tools/validate_schemas.py

  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check lockfiles exist
        run: |
          test -f runtime/door_core/Cargo.lock
          test -f editor/app/pnpm-lock.yaml
      - name: Verify Cargo.lock is up to date
        run: |
          cargo generate-lockfile --manifest-path runtime/door_core/Cargo.toml
          git diff --exit-code runtime/door_core/Cargo.lock
      - name: Verify pnpm-lock.yaml is up to date
        run: |
          pnpm install --dir editor/app --lockfile-only
          git diff --exit-code editor/app/pnpm-lock.yaml
