name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install editor dependencies
        run: pnpm install --dir editor/app --frozen-lockfile

      - name: Run checks on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/validate_schemas.py
          cargo test --manifest-path runtime/door_core/Cargo.toml
          cmake -S . -B build
          cmake --build build
          cd editor/app
          pnpm run typecheck
          pnpm run build
          cd ../..
          make check-perf-scenes

      - name: Run checks on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python tools/validate_schemas.py
          cargo test --manifest-path runtime/door_core/Cargo.toml
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release
          pnpm --dir editor/app run typecheck
          pnpm --dir editor/app run build
          New-Item -ItemType Directory -Path artifacts/perf -Force | Out-Null
          Get-ChildItem fixtures/perf/*.json | ForEach-Object {
            $name = $_.BaseName
            python tools/check_perf_budget.py --metrics $_.FullName --report-json "artifacts/perf/${name}_report.json"
          }

      - name: Upload perf budget reports
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: perf-budget-reports
          path: artifacts/perf/*.json
          if-no-files-found: error

  visual-regression:
    name: visual-regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install editor dependencies
        run: pnpm install --dir editor/app --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --dir editor/app exec playwright install --with-deps chromium

      - name: Build editor bundle for visual regression
        run: pnpm --dir editor/app run build

      - name: Visual baseline check
        shell: bash
        env:
          VISUAL_MAX_DIFF_PIXELS: "120000"
          VISUAL_MAX_DIFF_RATIO: "0.06"
        run: |
          set -euo pipefail
          make check-visual

  replay-determinism:
    name: replay-determinism
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Replay determinism check
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/replay_determinism_check.py --output-dir /tmp/replay-determinism

  lockfile-check:
    name: lockfile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check lockfiles exist
        run: |
          test -f runtime/door_core/Cargo.lock
          test -f editor/app/pnpm-lock.yaml
      - name: Verify Cargo.lock is up to date
        run: |
          cargo generate-lockfile --manifest-path runtime/door_core/Cargo.toml
          git diff --exit-code runtime/door_core/Cargo.lock
      - name: Verify pnpm-lock.yaml is up to date
        run: |
          pnpm install --dir editor/app --lockfile-only
          git diff --exit-code editor/app/pnpm-lock.yaml
